name: Build & Publish
on:
  push:
    branches: [main]
    paths: ['packages/**']
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://npm.pkg.github.com'
      - run: npm ci --legacy-peer-deps
      - run: |
          for pkg in ui sections engine; do
            cd packages/$pkg
            npx tsup
            npm publish
            cd ../..
          done
        env:
          NODE_AUTH_TOKEN: ${{secrets.GITHUB_TOKEN}}
